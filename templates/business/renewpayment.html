<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Renew Payment</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>

  <form method="POST" action="/myapp/businessrenew_success/">
    {% csrf_token %}

    <input type="hidden" name="plan" value="{{ data.plan }}">

    <!-- Razorpay will fill these -->
    <input type="hidden" name="razorpay_order_id" id="razorpay_order_id" value="{{ order_id }}">
    <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">
    <input type="hidden" name="razorpay_signature" id="razorpay_signature">

    <button id="pay-button" type="button">Pay Now</button>
  </form>

  <script>
    var options = {
      "key": "{{ razorpay_key }}",
      "amount": "{{ amount }}",
      "currency": "INR",
      "name": "Subscription Renewal",
      "description": "Renew Business Subscription",
      "order_id": "{{ order_id }}",

      "handler": function (response){
        document.getElementById("razorpay_payment_id").value = response.razorpay_payment_id;
        document.getElementById("razorpay_signature").value = response.razorpay_signature;
        document.getElementById("razorpay_order_id").value = response.razorpay_order_id;
        document.forms[0].submit();
      }
    };

    var rzp1 = new Razorpay(options);
    document.getElementById('pay-button').onclick = function(e){
      rzp1.open();
      e.preventDefault();
    }
  </script>

</body>
</html>
