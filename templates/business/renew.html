<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Renew Subscription</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container">
    <h3>Renew Subscription</h3>

    <div class="card p-3 mb-3">
      <p><b>Current Plan:</b> {{ biz.plantype }}</p>
      <p><b>Status:</b> {{ biz.status }}</p>
      <p><b>Start Date:</b> {{ biz.starting_date }}</p>
      <p><b>Expiry Date:</b> {{ biz.expiry_date }}</p>
    </div>

    <form method="POST" action="/myapp/businessrenew_post/">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Choose Plan</label>
        <select name="plan" class="form-control" required>
          <option value="">-- Select Plan --</option>
          <option value="1_month">1 Month - ₹500</option>
          <option value="3_month">3 Months - ₹1200</option>
          <option value="1_year">1 Year - ₹4000</option>
        </select>
      </div>

      <button class="btn btn-primary" type="submit">Proceed to Payment</button>
    </form>
  </div>
</body>
</html>
