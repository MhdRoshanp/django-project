<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forget Password</title>

  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- Google Fonts: Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      font-family: 'Poppins', sans-serif;
      background: #0f0c29;
      overflow: hidden;
    }

    /* Full-Screen Background Image */
    .bg-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80') no-repeat center center;
      background-size: cover;
      filter: blur(8px) brightness(0.6);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(10, 29, 55, 0.85), rgba(103, 58, 183, 0.7));
      z-index: -1;
    }

    /* Glassmorphic Card */
    .glass-card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 420px;
      width: 100%;
      animation: floatIn 1s ease-out forwards;
      opacity: 0;
    }

    @keyframes floatIn {
      0% { transform: translateY(50px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    h2 {
      font-weight: 700;
      color: #fff;
      text-align: center;
      margin-bottom: 30px;
      letter-spacing: 1.2px;
      font-size: 28px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    /* Floating Label Input */
    .form-group {
      position: relative;
      margin-bottom: 28px;
    }

    .form-control {
      background: rgba(255, 255, 255, 0.15);
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      border-radius: 14px;
      color: #fff;
      padding: 14px 16px 14px 48px;
      font-size: 16px;
      transition: all 0.3s ease;
      height: 56px;
    }

    .form-control::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .form-control:focus {
      background: rgba(255, 255, 255, 0.25);
      border-color: #00d4ff;
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.3);
      color: #fff;
    }

    .form-control:focus + label,
    .form-control:not(:placeholder-shown) + label {
      top: -10px;
      left: 14px;
      font-size: 12px;
      color: #00d4ff;
      background: rgba(10, 29, 55, 0.9);
      padding: 0 8px;
    }

    .form-label {
      position: absolute;
      top: 16px;
      left: 48px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 15px;
      pointer-events: none;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    /* Icon Inside Input */
    .input-icon {
      position: absolute;
      top: 16px;
      left: 16px;
      color: #00d4ff;
      font-size: 18px;
      z-index: 1;
    }

    /* Submit Button */
    .btn-submit {
      background: linear-gradient(135deg, #00d4ff, #007bff);
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 1px;
      color: white;
      width: 100%;
      transition: all 0.4s ease;
      box-shadow: 0 8px 20px rgba(0, 212, 255, 0.4);
    }

    .btn-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 25px rgba(0, 212, 255, 0.5);
      background: linear-gradient(135deg, #00eaff, #0099ff);
    }

      /* Messages (Django) */
    .messages {
      margin-bottom: 20px;
    }

    .alert {
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      position: relative;
      animation: slideIn 0.5s ease;
    }

    .alert-success {
      background: rgba(40, 167, 69, 0.25);
      border: 1px solid rgba(40, 167, 69, 0.5);
      color: #a8e6b8;
    }

    .alert-error {
      background: rgba(220, 53, 69, 0.25);
      border: 1px solid rgba(220, 53, 69, 0.5);
      color: #ff9999;
    }

    .close-btn {
      position: absolute;
      top: 8px;
      right: 12px;
      font-size: 18px;
      cursor: pointer;
      color: inherit;
      opacity: 0.7;
    }

    .close-btn:hover {
      opacity: 1;
    }

    @keyframes slideIn {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .glass-card {
        padding: 30px 20px;
        margin: 20px;
      }
      h2 { font-size: 24px; }
    }
  </style>
</head>
<body>

  <!-- Background Image -->
  <div class="bg-image"></div>
  <div class="overlay"></div>

  <!-- Main Container -->
  <div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="glass-card">

      <h2>Forget Password</h2>

      <!-- Django Form -->
      <form action="/myapp/forgetpassword_post/" method="post">
        {% csrf_token %}

        <!-- Email Input -->
        <div class="form-group">
          <i class="bi bi-envelope-fill input-icon"></i>
          <input
            type="email"
            class="form-control"
            name="forget"
            id="forget"
            placeholder=" "
            required
          />
          <label for="forget" class="form-label">Enter your Email</label>
        </div>

        <!-- Django Messages -->
        {% if messages %}
          <div class="messages">
            {% for message in messages %}
              <div class="alert alert-{{ message.tags|default:'info' }}">
                {{ message }}
                <span class="close-btn" onclick="this.parentElement.style.display='none';">×</span>
              </div>
            {% endfor %}
          </div>
        {% endif %}

        <!-- Submit Button -->
        <button type="submit" class="btn btn-submit">
          <i class="bi bi-send-fill me-2"></i> Send Reset Link
        </button>
      </form>

      <div class="text-center mt-4">
        <a href="/myapp/login_get/" class="text-light" style="text-decoration: none; font-size: 14px; opacity: 0.8;">
          <i class="bi bi-arrow-left-circle"></i> Back to Login
        </a>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Auto-hide alerts after 5 seconds
    setTimeout(() => {
      document.querySelectorAll('.alert').forEach(alert => {
        if (alert.style.display !== 'none') {
          alert.style.transition = 'opacity 0.5s';
          alert.style.opacity = '0';
          setTimeout(() => alert.style.display = 'none', 500);
        }
      });
    }, 5000);
  </script>
</body>
</html>
