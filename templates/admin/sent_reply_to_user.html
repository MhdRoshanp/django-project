{% extends 'admin/admin_home.html' %}
{% block body %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Send Complaint</title>
{#  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">#}
</head>
<body>
  <div class="container mt-5">
    <h4 class="mb-4">Send reply to users</h4>
    <form action="/myapp/SentReplyToUser_post/" method="post">
      <input type="hidden" name="id" value="{{ id }}">

      <!-- Complaint Text -->
      <div class="mb-3">
        <label for="complaint" class="form-label">Sent Reply To Users</label>
        <textarea class="form-control" id="complaint" name="reply" rows="4" placeholder="Write your complaint here..." required></textarea>
      </div>

      <!-- Optional File Upload -->

      <!-- Submit Button -->
      <button type="submit" class="btn btn-primary">Send Reply</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

{% endblock %}
