{% extends 'admin/admin_home.html' %}
{% block body %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
{#    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">#}
   
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="text-center">add subscription charge</h2>
                <form action="/myapp/AddSubscription_post/" method="post">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="username">Plan Type</label>
                        <input type="text" class="form-control" name="plantype" id="username" placeholder="Enter Plan Type" required>
                    </div>
                    <div class="form-group">
                        <label for="text">Amount</label>
                        <input type="text" class="form-control" name="amount" id="password" placeholder="Enter Amount" required>

                    <button type="submit" class="btn btn-primary btn-block">Add</button>
                </form>

            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
{% endblock %}
